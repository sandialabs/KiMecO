name: Tests

# Runs the unit test suite on every push and pull request so failures are
# caught before code is merged. Only tests/unit/ is run here because tests
# that depend on the external MESS binary cannot run in vanilla CI.

on:
  push:
  pull_request:

# Cancel an in-progress run if a newer commit is pushed to the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run unit tests
        run: pytest tests/unit/ -v
