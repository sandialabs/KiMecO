image: condaforge/mambaforge

stages:
  - install
  - test

variables:
  ENV_NAME: kimeco-ci
  PIP_NO_BUILD_ISOLATION: "1"

.common_rules: &common_rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

install:
  stage: install

  script:
    - mamba --version

    # create environment
    - mamba create -n $ENV_NAME python=3.10 pip -y
    - conda activate $ENV_NAME
    - conda config --set ssl_verify false

    # install dependencies
    - mamba install --file requirements.txt pytest setuptools wheel -y

    # install project
    - pip install --no-build-isolation --no-deps -e .

    # quick import check
    - python -c "import kimeco; print('Installation OK')"

  artifacts:
    paths:
      - /opt/conda/envs/$ENV_NAME
    expire_in: 1 day

  <<: *common_rules


tests:
  stage: test
  dependencies:
    - install

  script:
    - source /opt/conda/etc/profile.d/conda.sh
    - conda activate $ENV_NAME

    - |
      pytest -q
      rc=$?
      if [ $rc -eq 5 ]; then
        echo "No tests collected yet."
        exit 0
      fi
      exit $rc

    - |
      python - <<'PY'
      import kimeco
      import ase, cantera, dash, numpy, pandas, pint, plotly, scipy, sqlalchemy
      print("Import checks passed")
      PY

    - kmo --help
    - kmoui --help
    - kmopp --help

  <<: *common_rules