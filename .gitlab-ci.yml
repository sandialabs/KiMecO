image: condaforge/mambaforge

stages:
  - installation
  - unit_tests
  - functional_tests

variables:
  ENV_NAME: kimeco-ci
  CONDA_ENV_PATH: "$CI_PROJECT_DIR/.ci/conda-env"
  PIP_NO_BUILD_ISOLATION: "1"

.common_rules: &common_rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

installation:
  stage: installation

  before_script:
    - source /opt/conda/etc/profile.d/conda.sh
    - mamba --version
    - conda config --set ssl_verify false
    - mkdir -p "$CI_PROJECT_DIR/.ci"
    - mamba create -p "$CONDA_ENV_PATH" python=3.10 pip -y
    - conda activate "$CONDA_ENV_PATH"
    - mamba install --file requirements.txt pytest setuptools wheel -y
    - pip install --no-build-isolation --no-deps -e .
  
  script:
    - |
      python - <<'PY'
      import kimeco
      import ase, cantera, dash, numpy, pandas, pint, plotly, scipy, sqlalchemy
      print("Import checks passed")
      PY
    - kmo --help
    - kmoui --help
    - kmopp --help

  artifacts:
    paths:
      - .ci/conda-env/
    expire_in: 3 days

  <<: *common_rules



unit_tests:
  stage: unit_tests
  dependencies:
    - installation
  before_script:
    - source /opt/conda/etc/profile.d/conda.sh
    - conda activate "$CONDA_ENV_PATH"
  script:
    - |
      pytest -q
      rc=$?
      if [ $rc -eq 5 ]; then
        echo "No tests collected yet. CI is active and passing."
        exit 0
      fi
      exit $rc
  <<: *common_rules

functional_tests:
  stage: functional_tests
  dependencies:
    - installation
  before_script:
    - source /opt/conda/etc/profile.d/conda.sh
    - conda activate "$CONDA_ENV_PATH"
  script:
    - |
      pytest -q
      rc=$?
      if [ $rc -eq 5 ]; then
        echo "No tests collected yet. CI is active and passing."
        exit 0
      fi
      exit $rc
  <<: *common_rules