image: condaforge/mambaforge

stages:
  - install
  - unit_tests
  - functional_tests

variables:
  ENV_NAME: kimeco-ci
  PIP_NO_BUILD_ISOLATION: "1"

.common_rules: &common_rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

install:
  stage: install

  before_script:
    - conda init
    - mamba --version
    - conda config --set ssl_verify false

    # create environment
    - mamba create -n $ENV_NAME python=3.10 pip -y
    - conda activate $ENV_NAME

    # install dependencies
    - mamba install --file requirements.txt pytest setuptools wheel -y

    # install project
    - pip install --no-build-isolation --no-deps -e .

    # quick import check
    - python -c "import kimeco; print('Installation OK')"
  
  script:
    - python - <<'PY'
      import kimeco
      import ase, cantera, dash, numpy, pandas, pint, plotly, scipy, sqlalchemy
      print("Import checks passed")
      PY
    - kmo --help
    - kmoui --help
    - kmopp --help

  artifacts:
    paths:
      - /opt/conda/envs/$ENV_NAME
    expire_in: 1 day

  <<: *common_rules



unit_tests:
  stage: unit_tests
  dependencies:
    - installation
  before_script:
    - source "$CONDA_DIR/etc/profile.d/conda.sh"
    - conda activate "$ENV_NAME"
  script:
    - |
      pytest -q
      rc=$?
      if [ $rc -eq 5 ]; then
        echo "No tests collected yet. CI is active and passing."
        exit 0
      fi
      exit $rc
  <<: *common_rules

functional_tests:
  stage: functional_tests
  dependencies:
    - installation
  before_script:
    - source "$CONDA_DIR/etc/profile.d/conda.sh"
    - conda activate "$ENV_NAME"
  script:
    - |
      pytest -q
      rc=$?
      if [ $rc -eq 5 ]; then
        echo "No tests collected yet. CI is active and passing."
        exit 0
      fi
      exit $rc
  <<: *common_rules